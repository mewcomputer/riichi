name: riichi

services:
  postgres:
    image: postgres:16
    command: postgres -c wal_level=logical
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: riichi
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  electric:
    image: electricsql/electric:latest
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/riichi
      ELECTRIC_SECRET: ${RIICHI_ELECTRIC_SOURCE_SECRET:?set RIICHI_ELECTRIC_SOURCE_SECRET in .env}
      ELECTRIC_REPLICATION_STREAM_ID: riichi
      ELECTRIC_STORAGE_DIR: /var/lib/electric
      ELECTRIC_PORT: "5133"
    volumes:
      - electric-data:/var/lib/electric
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      target: api
    env_file: .env
    environment:
      # Override localhost URLs for Docker networking
      RIICHI_API_ADDR: 0.0.0.0:3000
      RIICHI_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/riichi
      RIICHI_ELECTRIC_URL: http://electric:5133
      RIICHI_AUTH_COOKIE_SECURE: "true"
      RIICHI_ATTACHMENT_BACKEND: s3
    depends_on:
      postgres:
        condition: service_healthy
      electric:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      RIICHI_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/riichi
      RIICHI_ATTACHMENT_BACKEND: s3
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1"
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  electric-data:
